<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Support Ticket</title>
    <style>
      body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .page { max-width: 760px; margin: 36px auto; padding: 0 20px; }
      .card { background: #fff; border-radius: 22px; padding: 30px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); }
      h1 { margin-top: 0; }
      label { display: block; margin: 16px 0 8px; color: #475569; }
      .input-field { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 1rem; }
      .button { margin-top: 22px; padding: 12px 18px; background: #2563eb; border: none; color: white; border-radius: 12px; font-size: 1rem; cursor: pointer; }
      .link { margin-top: 18px; display: inline-block; color: #2563eb; text-decoration: none; }
      .errorlist { margin: 8px 0 0; color: #ef4444; font-size: 0.95rem; list-style: none; padding-left: 0; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Create Support Ticket</h1>
        {% if request.GET.created == '1' %}
          <div style="margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; background: #dcfce7; color: #166534; border: 1px solid #86efac;">
            Ticket submitted successfully.
          </div>
        {% endif %}
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% for field in form %}
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <ul class="errorlist">
                {% for error in field.errors %}
                  <li>{{ error }}</li>
                {% endfor %}
              </ul>
            {% endif %}
          {% endfor %}
          <button type="submit" class="button">Submit Ticket</button>
        </form>
        <a href="{% url 'support_dashboard' %}" class="link">Back to Dashboard</a>
      </div>
    </div>
  </body>
</html>
